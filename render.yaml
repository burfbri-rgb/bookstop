services:
  - type: web
    name: bookstop
    runtime: python
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      mkdir -p .u2net
      curl -sL -o .u2net/u2net.onnx https://github.com/danielgatis/rembg/releases/download/v0.0.0/u2net.onnx
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bookstop-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: U2NET_HOME
        value: /opt/render/project/src/.u2net
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: GOOGLE_VISION_API_KEY
        sync: false
databases:
  - name: bookstop-db
    plan: free
